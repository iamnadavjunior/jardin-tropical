version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "mysql://jardin_user:${DB_PASSWORD:-changeme}@db:3306/jardin_tropical"
      NEXTAUTH_SECRET: "${NEXTAUTH_SECRET:-change-me-in-production}"
      NEXTAUTH_URL: "${NEXTAUTH_URL:-http://localhost:3000}"
      ADMIN_EMAIL: "${ADMIN_EMAIL:-admin@jardintropical.com}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-admin123}"
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:-rootchangeme}"
      MYSQL_DATABASE: jardin_tropical
      MYSQL_USER: jardin_user
      MYSQL_PASSWORD: "${DB_PASSWORD:-changeme}"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped

volumes:
  db_data:
